apiVersion: v1
kind: Service
metadata:
  name: go-flink-rpc
  labels:
    app: go-flink
spec:
  # ClusterIP service for go-flink submit to reach the current leader.
  # kube-proxy will round-robin across pods; only the leader handles SubmitJob
  # (non-leaders return a redirect indicating the real leader's address).
  selector:
    app: go-flink
  ports:
  - name: rpc
    port: 8000
    targetPort: 8000
